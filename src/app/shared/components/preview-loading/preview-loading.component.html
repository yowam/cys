@for (randomNumber of randomArray; track $index) {
  <div class="card">
    <div class="card-header">
      <div class="card-header-left">
        <span></span>
      </div>
      <div class="card-header-right">
        <span></span>
      </div>
    </div>
    <div class="card-body">
      <div class="card-content">
        @for (item of randomNumber; track $index; let isLast = $last) {
          <span [ngStyle]="{'width': isLast ? (item + '%') : '100%'}"></span>
        }
      </div>
      <div class="card-meta">
        <ul>
          <li>
            <div class="button-fake"></div>
          </li>
          <li>
            <div class="button-fake"></div>
          </li>
          <li>
            <div class="button-fake"></div>
          </li>
        </ul>
      </div>
    </div>
    <div class="card-footer"></div>
  </div>
}
