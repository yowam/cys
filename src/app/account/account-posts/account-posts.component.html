<app-filters
  [tagsEnabled]="false"
  [trendingEnabled]="false"
></app-filters>
@if (userConfessions) {
  <div>
    @for (confession of userConfessions; track trackById($index, confession)) {
      <app-preview
        [confession]="confession"
        [reaction]="confession.reactions[0]"
      ></app-preview>
    }
    @if (! endOfConfessions) {
      <button
        (click)="loadMore()"
        class="button button-wide account-more-button"
      >Load More</button>
    }
  </div>
}
